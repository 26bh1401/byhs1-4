<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYHS 1-4</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #f0f2f8;
            color: #1a1a2e;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        header {
            background: linear-gradient(135deg, #1e1b4b 0%, #3730a3 70%, #4f46e5 100%);
            padding: 22px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand { display: flex; align-items: baseline; gap: 12px; }
        .brand-num { font-family: 'Space Mono', monospace; font-size: 34px; color: #fff; letter-spacing: -2px; }
        .brand-num span { color: #a5b4fc; }
        .brand-sub { font-size: 12px; color: rgba(255,255,255,.45); font-weight: 500; }

        #loginBtn {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 12px; font-weight: 600;
            color: rgba(255,255,255,.75);
            background: rgba(255,255,255,.1);
            border: 1px solid rgba(255,255,255,.2);
            border-radius: 99px; padding: 8px 18px;
            cursor: pointer; transition: .2s;
        }
        #loginBtn:hover { background: rgba(255,255,255,.2); color: #fff; }

        nav {
            background: #fff;
            border-bottom: 1px solid #e8eaf0;
            position: sticky; top: 0; z-index: 50;
        }

        .nav-inner { max-width: 700px; margin: 0 auto; display: flex; }

        .nav-btn {
            flex: 1; padding: 16px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 14px; font-weight: 600;
            color: #9ca3af;
            background: none; border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer; transition: .2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .nav-btn:hover { color: #4f46e5; background: #f5f3ff; }
        .nav-btn.tab-active { color: #4f46e5; border-bottom-color: #4f46e5; }

        main {
            max-width: 700px; margin: 0 auto;
            padding: 40px 24px 100px;
            display: flex; flex-direction: column; gap: 32px;
        }

        .card {
            background: #fff;
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 4px 20px rgba(79,70,229,.07), 0 1px 4px rgba(0,0,0,.05);
        }

        .banner-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 16px; }
        @media (max-width: 500px) { .banner-grid { grid-template-columns: 1fr; } }

        .banner-dday { background: #eef2ff; border-radius: 18px; padding: 22px; }
        .banner-urgent { background: #fff1f2; border-radius: 18px; padding: 22px; }

        .chip-label {
            font-size: 10px; font-weight: 700;
            letter-spacing: .1em; text-transform: uppercase;
            margin-bottom: 10px; display: block;
        }
        .banner-dday .chip-label { color: #6366f1; }
        .banner-urgent .chip-label { color: #f43f5e; }

        .dday-num { font-family: 'Space Mono', monospace; font-size: 36px; font-weight: 700; color: #4338ca; line-height: 1; }
        .urgent-text { font-size: 15px; font-weight: 700; color: #e11d48; line-height: 1.5; }

        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 540px) { .two-col { grid-template-columns: 1fr; } }

        .icon-chip {
            width: 38px; height: 38px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; margin-bottom: 14px;
        }
        .chip-orange { background: #fff7ed; color: #f97316; }
        .chip-cyan   { background: #ecfeff; color: #06b6d4; }

        .card-title { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 10px; }
        .card-body { font-size: 13px; color: #6b7280; line-height: 1.75; white-space: pre-wrap; word-break: break-word; }

        .section-head {
            font-size: 16px; font-weight: 900; color: #1a1a2e;
            display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
        }
        .dot-yellow { width: 8px; height: 24px; border-radius: 99px; background: #facc15; flex-shrink: 0; }
        .dot-green  { width: 8px; height: 24px; border-radius: 99px; background: #10b981; flex-shrink: 0; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead tr { background: #f8f9fc; border-bottom: 1px solid #e8eaf0; }
        th { padding: 13px 20px; text-align: left; font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: #9ca3af; }
        td { padding: 15px 20px; color: #6b7280; border-bottom: 1px solid #f3f4f8; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: #fafafa; }
        td:first-child { font-weight: 700; color: #4f46e5; }
        td:last-child  { font-size: 12px; font-weight: 700; color: #818cf8; white-space: nowrap; }

        .range-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        @media (max-width: 500px) { .range-grid { grid-template-columns: 1fr; } }

        #range-cards > div {
            background: #fff; border-radius: 20px; padding: 22px 24px;
            border-left: 5px solid #10b981;
            box-shadow: 0 4px 20px rgba(0,0,0,.06);
            transition: transform .15s, box-shadow .15s;
        }
        #range-cards > div:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(0,0,0,.1); }
        #range-cards > div h3 { font-size: 14px; font-weight: 800; color: #059669; margin-bottom: 8px; }
        #range-cards > div p  { font-size: 14px; color: #6b7280; line-height: 1.7; }

        .board-title { font-size: 18px; font-weight: 900; margin-bottom: 20px; padding-bottom: 18px; border-bottom: 1px solid #f0f2f8; }

        #post-input-section { margin-bottom: 20px; display: flex; flex-direction: column; gap: 12px; }

        #post-text {
            font-family: 'Noto Sans KR', sans-serif; font-size: 14px;
            color: #1a1a2e; background: #f8f9fc;
            border: 1.5px solid #e8eaf0; border-radius: 16px;
            padding: 16px 18px; width: 100%; resize: none; outline: none; transition: .2s;
        }
        #post-text:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.1); }

        #addPostBtn {
            align-self: flex-end;
            font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700;
            color: #fff; background: #4f46e5; border: none;
            border-radius: 14px; padding: 12px 26px;
            cursor: pointer; transition: .2s;
            display: flex; align-items: center; gap: 7px;
        }
        #addPostBtn:hover { background: #4338ca; }

        #post-login-msg {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 13px; color: #9ca3af;
            border: 2px dashed #e8eaf0; border-radius: 16px;
            padding: 24px; margin-bottom: 20px;
        }

        #post-list { display: flex; flex-direction: column; gap: 14px; }
        #post-list > div {
            background: #f8f9fc; border: 1.5px solid #e8eaf0;
            border-radius: 16px; padding: 18px 20px; transition: border-color .15s;
        }
        #post-list > div:hover { border-color: #c7d2fe; }

        .auto-link { color: #4f46e5; text-decoration: underline; text-decoration-color: rgba(79,70,229,.3); font-weight: 500; text-underline-offset: 2px; }
        .auto-link:hover { color: #3730a3; }

        .delete-btn {
            font-family: 'Noto Sans KR', sans-serif; font-size: 11px; font-weight: 700;
            color: #f43f5e; background: none;
            border: 1px solid rgba(244,63,94,.3); border-radius: 6px;
            padding: 2px 8px; margin-left: 8px; cursor: pointer;
        }
        .delete-btn:hover { background: #fff1f2; }

        #admin-panel {
            background: #0f172a; border-radius: 24px;
            padding: 32px; box-shadow: 0 16px 48px rgba(0,0,0,.2);
        }
        .admin-head { font-size: 14px; font-weight: 700; color: #fbbf24; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .admin-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        .admin-field label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.35); }
        .admin-field input, .admin-field textarea {
            font-family: 'Noto Sans KR', sans-serif; font-size: 13px;
            background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);
            border-radius: 14px; padding: 13px 16px; color: #fff; outline: none; width: 100%; transition: border-color .2s;
        }
        .admin-field textarea { resize: vertical; min-height: 80px; }
        .admin-field input:focus, .admin-field textarea:focus { border-color: #fbbf24; }

        #saveBtn {
            font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 800;
            background: #fbbf24; color: #0f172a; border: none;
            border-radius: 14px; padding: 15px; width: 100%;
            cursor: pointer; transition: .2s;
            display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 6px;
        }
        #saveBtn:hover { background: #f59e0b; }

        .hidden { display: none !important; }

        footer { text-align: center; padding: 32px; font-size: 11px; color: #c4c9d8; letter-spacing: .05em; }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <span class="brand-num">1<span>—</span>4</span>
        <span class="brand-sub">병점고등학교</span>
    </div>
    <button id="loginBtn">관리자 로그인</button>
</header>

<nav>
    <div class="nav-inner">
        <button id="tab-exam" class="nav-btn tab-active">
            <i class="fas fa-calendar-alt"></i> 시험 &amp; 수행
        </button>
        <button id="tab-board" class="nav-btn">
            <i class="fas fa-comments"></i> 자유 게시판
        </button>
    </div>
</nav>

<main>

    <div id="content-exam">

        <div class="card">
            <div class="banner-grid">
                <div class="banner-dday">
                    <span class="chip-label">중간고사</span>
                    <p id="exam-dday" class="dday-num">계산 중…</p>
                </div>
                <div class="banner-urgent">
                    <span class="chip-label"><i class="fas fa-fire"></i> 가장 가까운 수행평가</span>
                    <p id="nearest-assessment" class="urgent-text">로딩 중…</p>
                </div>
            </div>
        </div>

        <div class="two-col">
            <div class="card">
                <div class="icon-chip chip-orange"><i class="fas fa-bullhorn"></i></div>
                <div class="card-title">공지사항</div>
                <div id="notice-content" class="card-body">내용을 불러오는 중…</div>
            </div>
            <div class="card">
                <div class="icon-chip chip-cyan"><i class="fas fa-futbol"></i></div>
                <div class="card-title">다음 부리미어리그</div>
                <div id="pl-content" class="card-body">일정을 불러오는 중…</div>
            </div>
        </div>

        <div>
            <div class="section-head"><span class="dot-yellow"></span>수행평가 일정</div>
            <div class="card" style="padding: 0; overflow: hidden;">
                <table>
                    <thead><tr><th>과목</th><th>내용</th><th>마감</th></tr></thead>
                    <tbody id="assessment-list"></tbody>
                </table>
            </div>
        </div>

        <div>
            <div class="section-head"><span class="dot-green"></span>시험 범위</div>
            <div id="range-cards" class="range-grid"></div>
        </div>

    </div>

    <div id="content-board" class="hidden">
        <div class="card">
            <div class="board-title">💬 게시판</div>
            <div id="post-input-section" class="hidden">
                <textarea id="post-text" rows="2" placeholder="반 친구들에게 하고 싶은 말을 남겨보세요…"></textarea>
                <button id="addPostBtn"><i class="fas fa-paper-plane"></i> 게시하기</button>
            </div>
            <div id="post-login-msg">
                <i class="fas fa-lock"></i>
                <span>로그인하면 글을 남길 수 있습니다.</span>
            </div>
            <div id="post-list"></div>
        </div>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="admin-head"><i class="fas fa-tools"></i> 관리자 데이터 수정</div>
        <div class="admin-field"><label>중간고사 날짜</label><input type="date" id="input-date"></div>
        <div class="admin-field"><label>수행평가 (과목|내용|날짜)</label><textarea id="input-assessments" placeholder="국어|독서 발표|2025-05-10"></textarea></div>
        <div class="admin-field"><label>시험 범위 (과목:내용)</label><textarea id="input-ranges" placeholder="수학:교과서 1~3단원"></textarea></div>
        <div class="admin-field"><label>공지사항</label><textarea id="input-notice" placeholder="공지 내용 입력"></textarea></div>
        <div class="admin-field"><label>PL 일정</label><textarea id="input-pl" placeholder="PL 일정 입력"></textarea></div>
        <button id="saveBtn"><i class="fas fa-save"></i> 서버에 저장하기</button>
    </div>

</main>

<footer>BYHS 1-4 · 2025</footer>

<script type="module" src="script.js"></script>
</body>
</html>
